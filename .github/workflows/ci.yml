name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GStreamer development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install jsonschema==4.25.1
      - run: python scripts/validate_schema.py

  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
      - run: chmod +x android/gradlew
      - run: ./android/gradlew -p android :app:testDebugUnitTest :app:lintDebug :app:assembleDebug :app:assemblePersonal
      - name: Create APK checksums
        run: sha256sum android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/personal/app-personal.apk > android/app/build/outputs/apk/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: auxscreen-android-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/personal/app-personal.apk
            android/app/build/outputs/apk/SHA256SUMS
          if-no-files-found: error
